<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rinova Admin | Inquiries</title>

  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    body {
      background: #eef7ff;
    }

    .admin-wrapper {
      width: min(1200px, 94%);
      margin: 40px auto;
    }

    .admin-login,
    .admin-panel {
      background: #fff;
      border-radius: 28px;
      padding: 30px;
      box-shadow: 0 20px 45px rgba(0,74,173,0.12);
    }

    .admin-login {
      max-width: 430px;
      margin: 100px auto;
    }

    .admin-login img {
      width: 160px;
      margin: 0 auto 25px;
    }

    .admin-login input,
    .admin-toolbar input,
    .admin-toolbar select {
      width: 100%;
      padding: 15px;
      margin-bottom: 14px;
      border-radius: 14px;
      border: 1px solid rgba(0,74,173,0.15);
      font-family: inherit;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }

    .admin-header h1 {
      color: var(--blue);
    }

    .admin-toolbar {
      display: grid;
      grid-template-columns: 1fr 260px 180px;
      gap: 15px;
      margin-bottom: 25px;
    }

    .inquiry-grid {
      display: grid;
      gap: 18px;
    }

    .inquiry-card {
      background: linear-gradient(180deg, #ffffff, #f7fbff);
      border: 1px solid rgba(0,74,173,0.12);
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 12px 30px rgba(0,74,173,0.08);
    }

    .inquiry-card h3 {
      color: var(--blue);
      margin-bottom: 8px;
    }

    .inquiry-card p {
      margin: 5px 0;
      color: var(--muted);
    }

    .inquiry-actions {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      flex-wrap: wrap;
    }

    .small-btn {
      border: none;
      padding: 10px 16px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 700;
    }

    .whatsapp-btn {
      background: #25d366;
      color: #fff;
    }

    .delete-btn {
      background: #ff3b30;
      color: #fff;
    }

    .status-badge {
      display: inline-block;
      background: rgba(255,152,0,0.15);
      color: #ff9800;
      padding: 6px 12px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 10px;
    }

    .hidden {
      display: none;
    }

    @media(max-width: 768px) {
      .admin-toolbar {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<div class="admin-wrapper">

  <div class="admin-login" id="loginBox">
    <img src="images/logo.png" alt="Rinova Logo">

    <h2>Admin Login</h2>
    <p>Login to view website inquiries.</p>

    <input type="email" id="adminEmail" placeholder="Admin Email">
    <input type="password" id="adminPassword" placeholder="Password">

    <button class="btn" id="loginBtn">Login</button>
  </div>

  <div class="admin-panel hidden" id="adminPanel">

    <div class="admin-header">
      <div>
        <h1>Rinova Inquiries</h1>
        <p>View, filter, export and manage student inquiries.</p>
      </div>

      <div>
        <button class="btn" id="exportBtn">Export CSV</button>
        <button class="btn-outline" id="logoutBtn">Logout</button>
      </div>
    </div>

    <div class="admin-toolbar">
      <input type="text" id="searchInput" placeholder="Search name, phone, email or service">

      <select id="serviceFilter">
        <option value="">All Services</option>
        <option value="Study Abroad">Study Abroad</option>
        <option value="IELTS Preparation">IELTS Preparation</option>
        <option value="PTE Preparation">PTE Preparation</option>
        <option value="Computer Classes">Computer Classes</option>
        <option value="Python Programming">Python Programming</option>
        <option value="Web Development">Web Development</option>
        <option value="Graphic Design">Graphic Design</option>
        <option value="Data Analytics">Data Analytics</option>
        <option value="Accounting Package Tally">Accounting Package Tally</option>
        <option value="Content Creation">Content Creation</option>
        <option value="Stock Market Training">Stock Market Training</option>
        <option value="General Inquiry">General Inquiry</option>
      </select>

      <button class="btn" id="refreshBtn">Refresh</button>
    </div>

    <div class="inquiry-grid" id="inquiryList"></div>

  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

  import {
    getFirestore,
    collection,
    getDocs,
    deleteDoc,
    doc,
    query,
    orderBy
  } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

  import {
    getAuth,
    signInWithEmailAndPassword,
    signOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAm1LImPJ96wxe9sy4kLA8YULkTqIz5btQ",
    authDomain: "rinova-education-website.firebaseapp.com",
    projectId: "rinova-education-website",
    storageBucket: "rinova-education-website.firebasestorage.app",
    messagingSenderId: "202309046466",
    appId: "1:202309046466:web:8a96535067d15777e0ab5b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  const loginBox = document.getElementById("loginBox");
  const adminPanel = document.getElementById("adminPanel");
  const inquiryList = document.getElementById("inquiryList");

  const loginBtn = document.getElementById("loginBtn");
  const logoutBtn = document.getElementById("logoutBtn");
  const refreshBtn = document.getElementById("refreshBtn");
  const exportBtn = document.getElementById("exportBtn");

  const searchInput = document.getElementById("searchInput");
  const serviceFilter = document.getElementById("serviceFilter");

  let inquiries = [];

  loginBtn.addEventListener("click", async () => {
    const email = document.getElementById("adminEmail").value.trim();
    const password = document.getElementById("adminPassword").value.trim();

    if (!email || !password) {
      alert("Please enter email and password.");
      return;
    }

    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch (error) {
      alert("Login failed. Check email or password.");
      console.error(error);
    }
  });

  logoutBtn.addEventListener("click", async () => {
    await signOut(auth);
  });

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      loginBox.classList.add("hidden");
      adminPanel.classList.remove("hidden");
      await loadInquiries();
    } else {
      loginBox.classList.remove("hidden");
      adminPanel.classList.add("hidden");
    }
  });

  async function loadInquiries() {
    inquiryList.innerHTML = "<p>Loading inquiries...</p>";

    try {
      const q = query(collection(db, "inquiries"), orderBy("createdAt", "desc"));
      const snapshot = await getDocs(q);

      inquiries = snapshot.docs.map(docItem => ({
        id: docItem.id,
        ...docItem.data()
      }));

      renderInquiries();

    } catch (error) {
      console.error(error);
      inquiryList.innerHTML = "<p>Failed to load inquiries. Check Firebase rules.</p>";
    }
  }

  function renderInquiries() {
    const searchText = searchInput.value.toLowerCase();
    const selectedService = serviceFilter.value;

    const filtered = inquiries.filter(item => {
      const combined = `
        ${item.fullName || ""}
        ${item.phone || ""}
        ${item.email || ""}
        ${item.service || ""}
        ${item.destination || ""}
        ${item.message || ""}
      `.toLowerCase();

      const matchesSearch = combined.includes(searchText);
      const matchesService = selectedService === "" || item.service === selectedService;

      return matchesSearch && matchesService;
    });

    if (filtered.length === 0) {
      inquiryList.innerHTML = "<p>No inquiries found.</p>";
      return;
    }

    inquiryList.innerHTML = filtered.map(item => {
      const createdAt = item.createdAt?.toDate
        ? item.createdAt.toDate().toLocaleString()
        : "Not available";

      const whatsappText = encodeURIComponent(
        `Hello ${item.fullName || ""}, this is Rinova Education. We received your inquiry about ${item.service || "our services"}.`
      );

      return `
        <div class="inquiry-card">
          <span class="status-badge">${item.status || "New"}</span>

          <h3>${item.fullName || "No Name"}</h3>

          <p><strong>Phone:</strong> ${item.phone || ""}</p>
          <p><strong>Email:</strong> ${item.email || ""}</p>
          <p><strong>Service:</strong> ${item.service || ""}</p>
          <p><strong>Destination:</strong> ${item.destination || "-"}</p>
          <p><strong>Message:</strong> ${item.message || "-"}</p>
          <p><strong>Source:</strong> ${item.source || "-"}</p>
          <p><strong>Date:</strong> ${createdAt}</p>

          <div class="inquiry-actions">
            <a class="small-btn whatsapp-btn" target="_blank" href="https://wa.me/977${item.phone}?text=${whatsappText}">
              WhatsApp
            </a>

            <button class="small-btn delete-btn" onclick="deleteInquiry('${item.id}')">
              Delete
            </button>
          </div>
        </div>
      `;
    }).join("");
  }

  window.deleteInquiry = async function(id) {
    if (!confirm("Delete this inquiry?")) return;

    try {
      await deleteDoc(doc(db, "inquiries", id));
      inquiries = inquiries.filter(item => item.id !== id);
      renderInquiries();
    } catch (error) {
      alert("Delete failed.");
      console.error(error);
    }
  };

  searchInput.addEventListener("input", renderInquiries);
  serviceFilter.addEventListener("change", renderInquiries);
  refreshBtn.addEventListener("click", loadInquiries);

  exportBtn.addEventListener("click", () => {
    if (inquiries.length === 0) {
      alert("No inquiries to export.");
      return;
    }

    const headers = [
      "Full Name",
      "Phone",
      "Email",
      "Service",
      "Destination",
      "Message",
      "Source",
      "Status",
      "Date"
    ];

    const rows = inquiries.map(item => [
      item.fullName || "",
      item.phone || "",
      item.email || "",
      item.service || "",
      item.destination || "",
      item.message || "",
      item.source || "",
      item.status || "",
      item.createdAt?.toDate ? item.createdAt.toDate().toLocaleString() : ""
    ]);

    const csvContent = [
      headers.join(","),
      ...rows.map(row => row.map(value => `"${String(value).replace(/"/g, '""')}"`).join(","))
    ].join("\n");

    const blob = new Blob([csvContent], { type: "text/csv" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "rinova-inquiries.csv";
    a.click();

    URL.revokeObjectURL(url);
  });
</script>

</body>
</html>
